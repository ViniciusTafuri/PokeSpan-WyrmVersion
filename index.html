// URL de exportação direta para CSV, a mais compatível com GitHub Pages
const SHEET_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/export?format=csv&gid=0`;

function getSlug(name) {
    if (!name) return "";
    let n = name.toLowerCase()
        .replace(/♀/g, '-f')
        .replace(/♂/g, '-m')
        .replace(/\./g, '')
        .replace(/'/g, '')
        .replace(/\s+/g, '-');
    
    // Trata especificamente as Mega Evoluções para o formato do PokemonDB
    if (n.includes('mega-')) {
        let parts = n.split('-');
        let base = parts.filter(p => p !== 'mega');
        return base.length > 1 ? base[0] + '-mega-' + base[1] : base[0] + '-mega';
    }
    return n;
}
			
function normalizarNome(nome) {
    if (!nome) return "";
    return nome.toString().toLowerCase().trim().replace(/["']/g, "");
}

async function carregarDadosDoSheets() {
    console.log("Iniciando busca de dados...");
    const escolhidos = new Set();

    try {
        // Timeout de 5 segundos para não travar a página se o Google demorar
        const controller = new AbortController();
        const timeoutId = setTimeout(() => controller.abort(), 5000);

        const response = await fetch(SHEET_URL, { signal: controller.signal });
        clearTimeout(timeoutId);

        if (!response.ok) throw new Error("Não foi possível acessar a planilha");

        const csvText = await response.text();
        const linhas = csvText.split(/\r?\n/);

        // Processamento das linhas
        for (let i = 1; i < linhas.length; i++) {
            const linha = linhas[i];
            if (!linha) continue;

            // Divide as colunas lidando com possíveis aspas
            const colunas = linha.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
            
            if (colunas.length >= 3) {
                const nomeLimpo = normalizarNome(colunas[2]); // Coluna C
                if (nomeLimpo) escolhidos.add(nomeLimpo);
            }
        }
        console.log("Pokémons sincronizados:", escolhidos);

    } catch (error) {
        console.error("Aviso: Não foi possível sincronizar com o Sheets:", error.message);
        // O erro não dispara mais o alerta chato para não travar a experiência
    }

    // SEMPRE renderiza a lista, mesmo que 'escolhidos' esteja vazio
    renderizarLista(escolhidos);
}

function renderizarLista(escolhidos) {
    const container = document.getElementById('tracker-list');
    if (!container) return;

    // Garante que a variável 'data' (vinda do Python) existe
    if (typeof data === 'undefined' || !data) {
        container.innerHTML = "<p style='color:white; background:red; padding:10px;'>Erro crítico: A lista de Pokémons não foi carregada no HTML.</p>";
        return;
    }

    container.innerHTML = "";
    let progressManual = JSON.parse(localStorage.getItem('poke_tracker_v7') || '[]');

    data.forEach((line, idx) => {
        const temEscolhidoNaLinha = line.pokes.some(p => escolhidos.has(normalizarNome(p.nome)));
        const card = document.createElement('div');
        
        // Se estiver na planilha OU no clique manual do navegador
        const isCompleted = temEscolhidoNaLinha || progressManual.includes(idx);
        card.className = 'card' + (isCompleted ? ' used' : '');
        
        let html = `<div class="line-title">${line.titulo}</div><div class="poke-list">`;
        
        line.pokes.forEach((p, i) => {
            const pkmEscolhido = escolhidos.has(normalizarNome(p.nome));
            html += `
                <div class="pkm ${p.is_mega ? 'mega' : ''} ${pkmEscolhido ? 'is-chosen' : ''}">
                    <img src="https://img.pokemondb.net/sprites/home/normal/${getSlug(p.nome)}.png" 
                         onerror="this.src='https://via.placeholder.com/70?text=? '">
                    <span>${p.nome}</span>
                </div>
            `;
            if (i < line.pokes.length - 1) html += '<span class="arrow">→</span>';
        });

        card.innerHTML = html + '</div>';
        
        card.onclick = () => {
            card.classList.toggle('used');
            if(card.classList.contains('used')) {
                if(!progressManual.includes(idx)) progressManual.push(idx);
            } else {
                progressManual = progressManual.filter(v => v !== idx);
            }
            localStorage.setItem('poke_tracker_v7', JSON.stringify(progressManual));
        };
        
        container.appendChild(card);
    });
}
